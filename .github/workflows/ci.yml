name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  harn:
    name: harn fmt / lint / check / package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Harn
        uses: burin-labs/harn/.github/actions/setup-harn@05e43962cdefae44a511e81942adeebc6fe47675

      - name: harn --version
        run: harn --version

      - name: Install dependencies
        run: harn install --locked

      - name: harn fmt --check
        run: harn fmt --check 20eq.harn lib/game.harn tests/game_test.harn

      - name: harn lint
        run: harn lint --strict 20eq.harn lib/game.harn tests/game_test.harn

      - name: harn check (typecheck)
        run: harn check --strict-types 20eq.harn lib/game.harn tests/game_test.harn

      - name: harn test
        run: harn test tests/ --parallel

      - name: harn package check
        run: harn package check

  # Roll-up job whose display name matches the org-level required status
  # check ("CI status"). Add new check jobs to `needs` as they're added so
  # this stays an honest gate.
  status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [harn]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [[ "${{ needs.harn.result }}" != "success" ]]; then
            echo "harn job result: ${{ needs.harn.result }}"
            exit 1
          fi
          echo "all required jobs passed"
