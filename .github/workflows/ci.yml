name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  harn:
    name: harn fmt / lint / check / package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install harn (prebuilt binary, SHA256-verified)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          workdir="$(mktemp -d)"
          cd "$workdir"

          version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/.harn-version")"
          version="${version#v}"
          asset="harn-x86_64-unknown-linux-gnu.tar.gz"
          release_url="https://github.com/burin-labs/harn/releases/download/v${version}"

          download() {
            local url="$1"
            local output="$2"
            for attempt in $(seq 1 60); do
              if curl -fsSL --retry 3 --retry-delay 2 -o "$output" "$url"; then
                return 0
              fi
              if [ "$attempt" -eq 60 ]; then
                return 1
              fi
              sleep 10
            done
          }

          download "${release_url}/${asset}" "$asset"
          download "${release_url}/SHA256SUMS" SHA256SUMS

          grep "  ${asset}$" SHA256SUMS | sha256sum -c -

          tar -xzf "$asset" -C "$HOME/.local/bin" harn
          chmod +x "$HOME/.local/bin/harn"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: harn --version
        run: harn --version

      - name: harn fmt --check
        run: harn fmt --check 20eq.harn

      - name: harn lint
        run: harn lint 20eq.harn

      - name: harn check (typecheck)
        run: harn check 20eq.harn

      - name: harn package check
        run: harn package check

  # Roll-up job whose display name matches the org-level required status
  # check ("CI status"). Add new check jobs to `needs` as they're added so
  # this stays an honest gate.
  status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [harn]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [[ "${{ needs.harn.result }}" != "success" ]]; then
            echo "harn job result: ${{ needs.harn.result }}"
            exit 1
          fi
          echo "all required jobs passed"
